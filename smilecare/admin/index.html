<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmileCare Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #0d6efd;
      --primary-dark: #0a58ca;
      --surface: #ffffff;
      --surface-soft: #f5faff;
      --text: #15314b;
      --muted: #6a7f93;
      --border: rgba(13, 110, 253, 0.12);
      --shadow: 0 20px 44px rgba(13, 110, 253, 0.1);
      --confirmed: #0f9d58;
      --cancelled: #d93025;
      --pending: #ff9800;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif; color: var(--text);
      background: linear-gradient(180deg, #f8fbff, #eef6ff); min-height: 100vh;
    }
    .container { width: min(1180px, calc(100% - 2rem)); margin: 0 auto; }
    .page { padding: 40px 0 60px; }
    .header {
      display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 24px;
    }
    .title h1 { font-size: clamp(2rem, 5vw, 2.8rem); line-height: 1.1; margin-bottom: 0.5rem; }
    .title p { color: var(--muted); }
    .actions { display:flex; gap: 0.75rem; flex-wrap: wrap; }
    .btn {
      border: 0; border-radius: 999px; padding: 0.9rem 1.2rem; cursor: pointer; font-weight: 600;
      background: linear-gradient(135deg, var(--primary), #66b2ff); color: #fff; box-shadow: var(--shadow);
    }
    .panel {
      background: rgba(255,255,255,0.92); border: 1px solid var(--border); border-radius: 24px; box-shadow: var(--shadow); overflow: hidden;
    }
    .summary {
      display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 1rem; margin-bottom: 24px;
    }
    .summary-card {
      background: rgba(255,255,255,0.92); border:1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow); padding:1.25rem;
    }
    .summary-card span { display:block; color: var(--muted); margin-bottom: 0.4rem; }
    .summary-card strong { font-size: 1.8rem; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 1020px; }
    th, td { padding: 1rem 1.1rem; text-align: left; vertical-align: top; border-bottom: 1px solid rgba(13,110,253,0.08); }
    th { background: var(--surface-soft); font-size: 0.92rem; color: var(--muted); font-weight: 600; }
    tbody tr:hover { background: rgba(13,110,253,0.03); }
    .badge {
      display:inline-flex; align-items:center; justify-content:center; border-radius:999px; padding:0.35rem 0.75rem; font-size:0.85rem; font-weight:600;
    }
    .badge.pending { color: #8a5b00; background: rgba(255, 152, 0, 0.14); }
    .badge.confirmed { color: var(--confirmed); background: rgba(15, 157, 88, 0.12); }
    .badge.cancelled { color: var(--cancelled); background: rgba(217, 48, 37, 0.12); }
    select {
      border-radius: 12px; border: 1px solid var(--border); padding: 0.75rem 0.9rem; background: #fff; color: var(--text); min-width: 140px;
    }
    .notice {
      display:none; margin-bottom:16px; padding: 0.95rem 1rem; border-radius: 14px; font-weight: 500;
    }
    .notice.show { display:block; }
    .notice.success { background: rgba(15, 157, 88, 0.12); color: var(--confirmed); }
    .notice.error { background: rgba(217, 48, 37, 0.12); color: var(--cancelled); }
    .empty { padding: 2rem; text-align: center; color: var(--muted); }
    @media (max-width: 900px) { .summary { grid-template-columns: repeat(2, minmax(0,1fr)); } }
    @media (max-width: 560px) { .summary { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="page">
    <div class="container">
      <div class="header">
        <div class="title">
          <h1>SmileCare Admin Dashboard</h1>
          <p>View all appointment requests and mark them as confirmed or cancelled.</p>
        </div>
        <div class="actions">
          <a class="btn" href="/">Open Website</a>
          <button class="btn" id="refreshButton" type="button">Refresh Data</button>
        </div>
      </div>

      <div class="summary" id="summaryCards">
        <article class="summary-card"><span>Total Appointments</span><strong id="totalCount">0</strong></article>
        <article class="summary-card"><span>Pending</span><strong id="pendingCount">0</strong></article>
        <article class="summary-card"><span>Confirmed</span><strong id="confirmedCount">0</strong></article>
        <article class="summary-card"><span>Cancelled</span><strong id="cancelledCount">0</strong></article>
      </div>

      <div class="notice" id="notice" role="status" aria-live="polite"></div>

      <section class="panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Patient</th>
                <th>Contact</th>
                <th>Service</th>
                <th>Appointment</th>
                <th>Message</th>
                <th>Email Sent</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="appointmentsBody">
              <tr><td colspan="7" class="empty">Loading appointments...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script>
    const appointmentsBody = document.getElementById('appointmentsBody');
    const refreshButton = document.getElementById('refreshButton');
    const notice = document.getElementById('notice');
    const totalCount = document.getElementById('totalCount');
    const pendingCount = document.getElementById('pendingCount');
    const confirmedCount = document.getElementById('confirmedCount');
    const cancelledCount = document.getElementById('cancelledCount');

    const formatDate = (value) => new Intl.DateTimeFormat('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }).format(new Date(value));
    const escapeHtml = (value = '') => String(value).replace(/[&<>"']/g, (character) => {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
      return map[character] || character;
    });

    const setNotice = (message, type) => {
      notice.textContent = message;
      notice.className = `notice show ${type}`;
      window.setTimeout(() => { notice.className = 'notice'; }, 2500);
    };

    const renderSummary = (appointments) => {
      const counts = appointments.reduce((accumulator, item) => {
        accumulator.total += 1;
        accumulator[item.status] += 1;
        return accumulator;
      }, { total: 0, pending: 0, confirmed: 0, cancelled: 0 });

      totalCount.textContent = counts.total;
      pendingCount.textContent = counts.pending;
      confirmedCount.textContent = counts.confirmed;
      cancelledCount.textContent = counts.cancelled;
    };

    const createStatusSelect = (appointment) => {
      const select = document.createElement('select');
      ['pending', 'confirmed', 'cancelled'].forEach((status) => {
        const option = document.createElement('option');
        option.value = status;
        option.textContent = status.charAt(0).toUpperCase() + status.slice(1);
        option.selected = appointment.status === status;
        select.appendChild(option);
      });

      select.addEventListener('change', async () => {
        const nextStatus = select.value;
        try {
          const response = await fetch(`/api/appointment/${appointment._id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: nextStatus }),
          });
          const result = await response.json();
          if (!response.ok) {
            throw new Error(result.message || 'Unable to update appointment status.');
          }
          setNotice(`Appointment for ${appointment.fullName} marked as ${nextStatus}.`, 'success');
          loadAppointments();
        } catch (error) {
          setNotice(error.message || 'Status update failed.', 'error');
          select.value = appointment.status;
        }
      });

      return select;
    };

    const renderAppointments = (appointments) => {
      renderSummary(appointments);

      if (!appointments.length) {
        appointmentsBody.innerHTML = '<tr><td colspan="7" class="empty">No appointments found yet.</td></tr>';
        return;
      }

      appointmentsBody.innerHTML = '';
      appointments.forEach((appointment) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><strong>${escapeHtml(appointment.fullName)}</strong><br /><span style="color:#6a7f93; font-size:0.92rem;">Created ${formatDate(appointment.createdAt)}</span></td>
          <td>${escapeHtml(appointment.phone)}<br /><a href="mailto:${escapeHtml(appointment.email)}">${escapeHtml(appointment.email)}</a></td>
          <td>${escapeHtml(appointment.service)}</td>
          <td>${formatDate(appointment.appointmentDate)}<br />${escapeHtml(appointment.preferredTime)}</td>
          <td>${appointment.message ? escapeHtml(appointment.message) : '<span style="color:#6a7f93;">No notes</span>'}</td>
          <td>${appointment.confirmationEmailSent ? 'Yes' : 'No'}</td>
          <td><span class="badge ${appointment.status}">${appointment.status}</span><div style="margin-top:0.7rem;"></div></td>
        `;
        row.querySelector('td:last-child div').appendChild(createStatusSelect(appointment));
        appointmentsBody.appendChild(row);
      });
    };

    async function loadAppointments() {
      refreshButton.disabled = true;
      refreshButton.textContent = 'Refreshing...';
      try {
        const response = await fetch('/api/appointments');
        const result = await response.json();
        if (!response.ok) {
          throw new Error(result.message || 'Unable to load appointments.');
        }
        renderAppointments(result.appointments || []);
      } catch (error) {
        appointmentsBody.innerHTML = `<tr><td colspan="7" class="empty">${error.message || 'Failed to fetch appointments.'}</td></tr>`;
        setNotice(error.message || 'Failed to fetch appointments.', 'error');
      } finally {
        refreshButton.disabled = false;
        refreshButton.textContent = 'Refresh Data';
      }
    }

    refreshButton.addEventListener('click', loadAppointments);
    loadAppointments();
  </script>
</body>
</html>
